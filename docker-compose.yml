version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eventos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: eventos_api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eventos_db
      - SECRET_KEY=substitua_por_uma_chave_secreta_longa_e_segura_12345
      - PORT=8000
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: